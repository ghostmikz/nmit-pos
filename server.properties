# NMIT-POS Server Configuration
# Place this file in the same directory as the server JAR (or project root when running from IDE).
# Edit the values below to match your LAN setup, then restart the server.

# ── Network ──────────────────────────────────────────────────────────────────
# Port the server listens on. Clients must use the same port in settings.properties.
server.port=9090

# ── Database ──────────────────────────────────────────────────────────────────
# Full JDBC URL for MySQL. Change 'localhost' if MySQL is on a different machine.
db.url=jdbc:mysql://localhost:3306/pos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true

# MySQL username
db.user=root

# MySQL password
db.password=0312
